<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>소행성 키우기 (UI 간소화 및 0점 시작 패치)</title>
    <style>
        * {
            box-sizing: border-box;
            /* 모바일 터치 시 하이라이트 및 롱프레스 메뉴 방지 */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020206;
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
            position: fixed; /* iOS 스크롤 튕김 방지 */
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        /* 반응형 UI 레이아웃 최적화 */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: clamp(18px, 4vw, 24px); 
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
            pointer-events: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 5;
            max-width: 90%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        /* 팝업창 반응형 스타일 */
        .popup {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(4, 4, 12, 0.95);
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            z-index: 10;
            width: 85%;
            max-width: 450px;
        }
        #gameover { border: 2px solid #ff4444; box-shadow: 0 0 20px rgba(255, 68, 68, 0.5); }
        #gameover h1 { color: #ff4444; margin-top: 0; font-size: 32px; }
        
        #gameclear { border: 2px solid #aa44ff; box-shadow: 0 0 40px rgba(170, 68, 255, 0.6); }
        #gameclear h1 { color: #dcb4ff; margin-top: 0; font-size: 32px; text-shadow: 0 0 15px rgba(170, 68, 255, 0.8); }

        .popup p { font-size: 15px; line-height: 1.5; color: #ddd; }

        .popup button {
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            width: 100%; 
        }
        #gameover button { background: #ff4444; }
        #gameover button:hover { background: #ff6666; }
        #gameclear button { background: #aa44ff; }
        #gameclear button:hover { background: #c377ff; }
        
        .hint-text {
            font-size: 12px;
            color: #777;
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>현재 점수: <span id="score">0</span></div>
        <div id="control-hint" style="font-size: 0.65em; color: #ccc; margin-top: 6px; font-weight: normal;">조작: 방향키, WASD 또는 화면 터치 드래그</div>
    </div>
    
    <div id="gameover" class="popup">
        <h1>GAME OVER</h1>
        <p>자신보다 거대한 천체와 충돌했습니다!</p>
        <button onclick="resetGame()">다시 시작</button>
        <div class="hint-text" id="reset-hint-over">[ 스페이스바 ]나 화면을 터치하세요.</div>
    </div>

    <div id="gameclear" class="popup">
        <h1>GAME CLEAR</h1>
        <p>축하합니다! 시공간을 왜곡하는 초거대 블랙홀로 각성했습니다!</p>
        <button onclick="resetGame()">우주 재창조 (다시 시작)</button>
        <div class="hint-text" id="reset-hint-clear">[ 스페이스바 ]나 화면을 터치하세요.</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('gameover');
        const gameClearEl = document.getElementById('gameclear');
        const controlHintEl = document.getElementById('control-hint');
        const resetHintOver = document.getElementById('reset-hint-over');
        const resetHintClear = document.getElementById('reset-hint-clear');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const WIN_MASS_LIMIT = 10000; 
        const CELESTIAL_COLLISION_MODE = 'SMALLER_DESTROY'; 

        let isGameOver = false;
        let isGameClear = false;
        let isExploding = false; 
        let isBlackholing = false; 
        let blackholeRotation = 0; 
        
        let celestials = [];
        let particles = []; 
        let lastTime = 0;

        let globalScoreMultiplier = 1.0; 
        const SCALE_TRIGGER_LIMIT = 60;  

        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, s: false, a: false, d: false
        };
        
        let touchStartPos = { x: 0, y: 0 };
        let touchMoveVector = { x: 0, y: 0 };
        let touchActive = false;
        let isMobile = false;

        let camera = { 
            x: 0, 
            y: 0, 
            zoom: 1.0,       
            targetZoom: 1.0  
        };

        let player = {
            worldX: 0,
            worldY: 0,
            vx: 0,
            vy: 0,
            radius: 15,
            color: '#f1c40f'
        };

        const BASE_ACCELERATION = 80.0;  
        const FRICTION_DECAY = 1.8;      
        const MAX_SPEED = 480;           
        const GRAVITY_CONSTANT = 35.0;   
        const MAX_CELESTIALS = 60;    

        function handleGameKeyDown(key) {
            if (key in keys) keys[key] = true;
            if (key === ' ' || key === 'Spacebar') {
                if (isGameOver || isGameClear) {
                    resetGame();
                }
            }
        }

        function handleGameKeyUp(key) {
            if (key in keys) keys[key] = false;
        }

        window.addEventListener('keydown', (e) => {
            handleGameKeyDown(e.key);
        });
        window.addEventListener('keyup', (e) => {
            handleGameKeyUp(e.key);
        });

        window.addEventListener('message', (e) => {
            if (!e.data || !e.data.type) return;

            if (e.data.type === 'GAME_KEYDOWN') {
                handleGameKeyDown(e.data.key);
            } else if (e.data.type === 'GAME_KEYUP') {
                handleGameKeyUp(e.data.key);
            }
        });

        function enableMobileUI() {
            if (isMobile) return;
            isMobile = true;
            resetHintOver.innerText = "팝업창 또는 화면을 터치해 재시작";
            resetHintClear.innerText = "팝업창 또는 화면을 터치해 재시작";
        }

        window.addEventListener('touchstart', (e) => {
            enableMobileUI();
            if (isGameOver || isGameClear) return;
            
            touchActive = true;
            const touch = e.touches[0];
            touchStartPos.x = touch.clientX;
            touchStartPos.y = touch.clientY;
            touchMoveVector.x = 0;
            touchMoveVector.y = 0;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!touchActive) return;
            
            const touch = e.touches[0];
            const dx = touch.clientX - touchStartPos.x;
            const dy = touch.clientY - touchStartPos.y;
            const dist = Math.hypot(dx, dy);

            const maxDragRange = 40; 
            if (dist === 0) {
                touchMoveVector.x = 0;
                touchMoveVector.y = 0;
            } else {
                const scalar = Math.min(dist, maxDragRange) / maxDragRange;
                touchMoveVector.x = (dx / dist) * scalar;
                touchMoveVector.y = (dy / dist) * scalar;
            }
        }, { passive: true });

        window.addEventListener('touchend', () => {
            touchActive = false;
            touchMoveVector.x = 0;
            touchMoveVector.y = 0;
        }, { passive: true });

        window.addEventListener('click', () => {
            if (isGameOver || isGameClear) {
                resetGame();
            }
        });


        class Celestial {
            constructor(worldX, worldY, radius) {
                this.worldX = worldX;
                this.worldY = worldY;
                this.radius = radius;
                this.color = this.assignColor();
                this.vx = (Math.random() - 0.5) * 30;
                this.vy = (Math.random() - 0.5) * 30;
                this.screenX = 0;
                this.screenY = 0;
            }

            assignColor() {
                let actualSize = this.radius * globalScoreMultiplier;
                if (actualSize < 20) return '#2ecc71';      
                if (actualSize < 50) return '#3498db';      
                if (actualSize < 120) return '#9b59b6';      
                return '#e74c3c';                       
            }

            get gravityRadius() { return this.radius * 3.0; }

            update(dt) {
                this.worldX += this.vx * dt;
                this.worldY += this.vy * dt;
                
                this.screenX = canvas.width / 2 + (this.worldX - camera.x) * camera.zoom;
                this.screenY = canvas.height / 2 + (this.worldY - camera.y) * camera.zoom;
            }

            draw() {
                const margin = (this.gravityRadius + 400) * camera.zoom;
                if (this.screenX < -margin || this.screenX > canvas.width + margin ||
                    this.screenY < -margin || this.screenY > canvas.height + margin) {
                    return;
                }

                if (this.radius > player.radius && !isBlackholing) {
                    ctx.beginPath();
                    ctx.arc(this.worldX, this.worldY, this.gravityRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(231, 76, 60, 0.15)';
                    let dashPattern = Math.max(1, 4 / camera.zoom);
                    ctx.setLineDash([dashPattern, dashPattern]); 
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                ctx.beginPath();
                ctx.arc(this.worldX, this.worldY, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = this.radius * 0.05;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, mode = 'explode') {
                this.x = x;
                this.y = y;
                this.mode = mode; 
                this.radius = Math.random() * 3 + 1;
                this.life = 100;
                this.opacity = 1;

                const angle = Math.random() * Math.PI * 2;
                if (mode === 'explode') {
                    const speed = (Math.random() * 300 + 100) / camera.zoom;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                } else {
                    const speed = Math.random() * 5 + 3;
                    const startDist = (player.radius * 2.5 + Math.random() * 200) / camera.zoom;
                    this.x = player.worldX + Math.cos(angle) * startDist;
                    this.y = player.worldY + Math.sin(angle) * startDist;
                    this.vx = 0;
                    this.vy = 0;
                    this.color = Math.random() > 0.5 ? '#ffaa44' : '#da70d6';
                }
            }

            update(dt) {
                if (this.mode === 'explode') {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.life -= 150 * dt; 
                    this.radius *= Math.pow(0.1, dt);
                    this.opacity = Math.max(0, this.life / 100);
                } else {
                    let dx = player.worldX - this.x;
                    let dy = player.worldY - this.y;
                    let dist = Math.hypot(dx, dy);
                    
                    let pullSpeed = (5.5 / camera.zoom) * (dt * 60);
                    let rotSpeed = (4.0 / camera.zoom) * (dt * 60);

                    this.x += (dx / dist) * pullSpeed + (dy / dist) * rotSpeed; 
                    this.y += (dy / dist) * pullSpeed - (dx / dist) * rotSpeed;
                    
                    if (dist < player.radius * 0.8) this.life = 0;
                    this.opacity = Math.min(1, dist / (player.radius * 2));
                }
            }

            draw() {
                if (this.opacity <= 0) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.mode === 'explode' ? `rgba(255, 80, 20, ${this.opacity})` : this.color;
                ctx.fill();
            }
        }

        function init() {
            isGameOver = false;
            isGameClear = false;
            isExploding = false;
            isBlackholing = false;
            blackholeRotation = 0;
            globalScoreMultiplier = 1.0; 
            gameOverEl.style.display = 'none';
            gameClearEl.style.display = 'none';
            
            player.worldX = 0;
            player.worldY = 0;
            player.vx = 0;
            player.vy = 0;
            player.radius = 15;
            player.color = '#f1c40f';
            
            camera.x = 0;
            camera.y = 0;
            camera.zoom = 1.0;
            camera.targetZoom = 1.0;

            celestials = [];
            particles = []; 

            for (let i = 0; i < MAX_CELESTIALS; i++) {
                spawnCelestial(true);
            }
        }

        function spawnCelestial(initial = false) {
            let minRadius = Math.max(5, player.radius * 0.15);
            let maxRadius = player.radius * 2.3;
            let radius = Math.random() * (maxRadius - minRadius) + minRadius;
            
            if (Math.random() > 0.94) radius = Math.random() * (player.radius * 1.5) + (player.radius * 2.0);

            const currentSpawnRadius = Math.max(1800, 1500 / camera.zoom);

            if (initial) {
                let angle = Math.random() * Math.PI * 2;
                let distance = Math.random() * (currentSpawnRadius - 400) + 300; 
                let wX = player.worldX + Math.cos(angle) * distance;
                let wY = player.worldY + Math.sin(angle) * distance;
                celestials.push(new Celestial(wX, wY, radius));
            } else {
                const padding = 300 / camera.zoom; 
                const halfW = (canvas.width / 2) / camera.zoom;
                const halfH = (canvas.height / 2) / camera.zoom;

                const edge = Math.floor(Math.random() * 4);
                let sX, sY;

                if (edge === 0) { 
                    sX = camera.x - halfW - padding - Math.random() * 400;
                    sY = camera.y - halfH + Math.random() * (halfH * 2);
                } else if (edge === 1) { 
                    sX = camera.x + halfW + padding + Math.random() * 400;
                    sY = camera.y - halfH + Math.random() * (halfH * 2);
                } else if (edge === 2) { 
                    sX = camera.x - halfW + Math.random() * (halfW * 2);
                    sY = camera.y - halfH - padding - Math.random() * 400;
                } else { 
                    sX = camera.x - halfW + Math.random() * (halfW * 2);
                    sY = camera.y + halfH + padding + Math.random() * 400;
                }

                celestials.push(new Celestial(sX, sY, radius));
            }
        }

        function updatePlayer(dt) {
            if (isExploding || isBlackholing) return; 

            if (keys.ArrowUp || keys.w) player.vy -= BASE_ACCELERATION / camera.zoom;
            if (keys.ArrowDown || keys.s) player.vy += BASE_ACCELERATION / camera.zoom;
            if (keys.ArrowLeft || keys.a) player.vx -= BASE_ACCELERATION / camera.zoom;
            if (keys.ArrowRight || keys.d) player.vx += BASE_ACCELERATION / camera.zoom;

            if (touchActive && (touchMoveVector.x !== 0 || touchMoveVector.y !== 0)) {
                player.vx += touchMoveVector.x * (BASE_ACCELERATION * 1.5 / camera.zoom);
                player.vy += touchMoveVector.y * (BASE_ACCELERATION * 1.5 / camera.zoom);
            }

            player.vx *= Math.exp(-FRICTION_DECAY * dt);
            player.vy *= Math.exp(-FRICTION_DECAY * dt);

            const currentMaxSpeed = MAX_SPEED / camera.zoom;
            let speed = Math.hypot(player.vx, player.vy);
            if (speed > currentMaxSpeed) {
                player.vx = (player.vx / speed) * currentMaxSpeed;
                player.vy = (player.vy / speed) * currentMaxSpeed;
            }

            player.worldX += player.vx * dt;
            player.worldY += player.vy * dt;

            camera.x += (player.worldX - camera.x) * (1 - Math.pow(0.001, dt));
            camera.y += (player.worldY - camera.y) * (1 - Math.pow(0.001, dt));

            camera.targetZoom = 15 / (10 + player.radius * 0.18); 
            camera.zoom += (camera.targetZoom - camera.zoom) * (1 - Math.pow(0.05, dt));
        }

        function rescaleWorld() {
            const factor = 0.5; 
            player.radius *= factor;
            player.worldX *= factor;
            player.worldY *= factor;
            player.vx *= factor;
            player.vy *= factor;

            camera.x *= factor;
            camera.y *= factor;
            camera.zoom /= factor; 
            camera.targetZoom /= factor;

            celestials.forEach(c => {
                c.worldX *= factor;
                c.worldY *= factor;
                c.radius *= factor;
                c.vx *= factor;
                c.vy *= factor;
            });

            particles.forEach(p => {
                p.x *= factor;
                p.y *= factor;
                p.vx *= factor;
                p.vy *= factor;
                p.radius *= factor;
            });

            globalScoreMultiplier /= factor;
        }

        function handlePhysics(dt) {
            if (isExploding) return; 

            if (isBlackholing) {
                blackholeRotation += 2.4 * dt; 
                celestials.forEach((c, index) => {
                    let dx = c.worldX - player.worldX;
                    let dy = c.worldY - player.worldY;
                    let distance = Math.hypot(dx, dy);
                    
                    c.worldX -= (dx / distance) * (1100 / camera.zoom) * dt;
                    c.worldY -= (dy / distance) * (1100 / camera.zoom) * dt;

                    if (distance < player.radius * 0.9) {
                        celestials.splice(index, 1);
                    }
                });
                
                scoreEl.innerText = WIN_MASS_LIMIT;
                return;
            }

            const currentDespawnRadius = Math.max(2200, 2000 / camera.zoom);

            for (let i = celestials.length - 1; i >= 0; i--) {
                let c = celestials[i];
                
                let dx = c.worldX - player.worldX;
                let dy = c.worldY - player.worldY;
                let distance = Math.hypot(dx, dy);

                if (distance > currentDespawnRadius) {
                    celestials.splice(i, 1);
                    spawnCelestial(false);
                    continue;
                }

                if (c.radius > player.radius) {
                    if (distance < c.gravityRadius) {
                        let force = (GRAVITY_CONSTANT * c.radius) / (distance * 0.1 + 4);
                        player.vx += (dx / distance) * force * 15 * dt;
                        player.vy += (dy / distance) * force * 15 * dt;
                    }
                }

                if (distance < player.radius + c.radius) {
                    if (player.radius >= c.radius) {
                        player.radius = Math.sqrt(player.radius * player.radius + c.radius * c.radius * 0.4);
                        celestials.splice(i, 1);
                        spawnCelestial(false);

                        if (player.radius >= SCALE_TRIGGER_LIMIT && !isBlackholing) {
                            rescaleWorld();
                        }

                        let currentActualMass = player.radius * globalScoreMultiplier;
                        // 🛠️ 시작 크기(15)를 제외하여 순수 0점부터 올라가도록 연산 동기화
                        let currentScore = Math.max(0, Math.floor(currentActualMass - 15));

                        if (currentScore >= WIN_MASS_LIMIT) {
                            startBlackholeSequence();
                            return;
                        }
                    } else {
                        startExplosion();
                        break;
                    }
                }
            }

            if (CELESTIAL_COLLISION_MODE !== 'OFF') {
                for (let i = 0; i < celestials.length; i++) {
                    for (let j = i + 1; j < celestials.length; j++) {
                        let c1 = celestials[i];
                        let c2 = celestials[j];

                        let c_dx = c2.worldX - c1.worldX;
                        let c_dy = c2.worldY - c1.worldY;
                        let c_dist = Math.hypot(c_dx, c_dy);

                        if (c_dist < c1.radius + c2.radius) {
                            if (CELESTIAL_COLLISION_MODE === 'BOTH_DESTROY') {
                                celestials.splice(j, 1); 
                                celestials.splice(i, 1); 
                                i--; 
                                spawnCelestial(false);
                                spawnCelestial(false);
                                break; 
                            } 
                            else if (CELESTIAL_COLLISION_MODE === 'SMALLER_DESTROY') {
                                if (c1.radius >= c2.radius) {
                                    celestials.splice(j, 1);
                                    j--;
                                    spawnCelestial(false);
                                } else {
                                    celestials.splice(i, 1);
                                    i--;
                                    spawnCelestial(false);
                                    break;
                                }
                            }
                        }
                    }
                }
            }

            // 🛠️ 초기 본체 크기(15) 차감 연산으로 0점부터 정직하게 상승
            scoreEl.innerText = Math.max(0, Math.floor(player.radius * globalScoreMultiplier - 15));
        }

        function startBlackholeSequence() {
            isBlackholing = true;
            player.color = '#000002'; 
            scoreEl.innerText = WIN_MASS_LIMIT; // 🛠️ 블랙홀 시퀀스 진입 순간 클리어 스코어로 즉시 못박기
            
            for (let i = 0; i < 120; i++) {
                particles.push(new Particle(0, 0, 'blackhole'));
            }

            setTimeout(() => {
                isGameClear = true;
                gameClearEl.style.display = 'block';
            }, 4000); 
        }

        function startExplosion() {
            isExploding = true;
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle(player.worldX, player.worldY, 'explode'));
            }
            setTimeout(() => {
                isGameOver = true;
                gameOverEl.style.display = 'block';
            }, 1200);
        }

        function drawBackground() {
            const gridSize = 100;
            
            let startX = (canvas.width / 2 - camera.x * camera.zoom) % (gridSize * camera.zoom);
            let startY = (canvas.height / 2 - camera.y * camera.zoom) % (gridSize * camera.zoom);
            
            if (startX > 0) startX -= (gridSize * camera.zoom);
            if (startY > 0) startY -= (gridSize * camera.zoom);

            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;

            for (let x = startX; x < canvas.width; x += (gridSize * camera.zoom)) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
            }
            for (let y = startY; y < canvas.height; y += (gridSize * camera.zoom)) {
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();
        }

        function drawAccretionDisk(wX, wY, r) {
            ctx.save();
            ctx.translate(wX, wY);
            ctx.rotate(blackholeRotation); 

            ctx.beginPath();
            ctx.arc(0, 0, r * 1.3, 0, Math.PI * 2);
            let lensGrad = ctx.createRadialGradient(0, 0, r * 0.9, 0, 0, r * 1.6);
            lensGrad.addColorStop(0, 'rgba(0, 0, 0, 1)');
            lensGrad.addColorStop(0.1, 'rgba(255, 140, 0, 0.7)');  
            lensGrad.addColorStop(0.3, 'rgba(138, 43, 226, 0.4)'); 
            lensGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = lensGrad;
            ctx.fill();

            ctx.scale(2.2, 0.4); 
            ctx.beginPath();
            ctx.arc(0, 0, r * 1.4, 0, Math.PI * 2);
            let diskGrad = ctx.createRadialGradient(0, 0, r * 0.8, 0, 0, r * 1.5);
            diskGrad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            diskGrad.addColorStop(0.2, 'rgba(255, 69, 0, 0.8)');
            diskGrad.addColorStop(0.6, 'rgba(75, 0, 130, 0.3)');
            diskGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = diskGrad;
            ctx.fill();

            ctx.restore();
        }

        function resetGame() {
            init();
            lastTime = performance.now(); 
            requestAnimationFrame(animate);
        }

        function animate(currentTime) {
            if (isGameOver || isGameClear) return;

            let dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            if (dt > 0.1) dt = 0.1; 

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();

            celestials.forEach(c => c.update(dt));
            updatePlayer(dt);
            handlePhysics(dt); 

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            celestials.forEach(c => c.draw());

            if (!isExploding) {
                if (isBlackholing) {
                    drawAccretionDisk(player.worldX, player.worldY, player.radius);

                    ctx.beginPath();
                    ctx.arc(player.worldX, player.worldY, player.radius * 0.95, 0, Math.PI * 2);
                    ctx.fillStyle = '#010103';
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(player.worldX, player.worldY, player.radius, 0, Math.PI * 2);
                    ctx.fillStyle = player.color;
                    ctx.shadowBlur = player.radius * 0.1; 
                    ctx.shadowColor = player.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            if (isExploding || isBlackholing) {
                particles.forEach((p, index) => {
                    p.update(dt);
                    p.draw();
                    if (p.life <= 0 && p.mode === 'explode') {
                        particles.splice(index, 1);
                    }
                    if (p.life <= 0 && p.mode === 'blackhole' && !isGameClear) {
                        particles[index] = new Particle(0, 0, 'blackhole');
                    }
                });
            }

            ctx.restore(); 

            requestAnimationFrame(animate);
        }

        init();
        requestAnimationFrame((timestamp) => {
            lastTime = timestamp;
            animate(timestamp);
        });
    </script>
</body>
