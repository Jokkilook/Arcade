<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>고속도로 주행 시뮬레이션 (터치 버튼 확대판)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; 
            overflow: hidden;
            touch-action: none; 
        }

        #gameContainer {
            position: relative;
            background-color: #222;
            height: 100dvh;
            width: calc(100dvh * (520 / 900));
            max-width: 520px;
            max-height: 900px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        @media (max-aspect-ratio: 520/900) {
            #gameContainer {
                width: 100vw;
                height: calc(100vw * (900 / 520));
            }
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background-color: #333;
        }

        #dashboard {
            position: absolute;
            top: 4%;
            left: 4%;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 2% 4%;
            border-radius: 6px;
            border-left: 4px solid #00ffcc;
            pointer-events: none;
        }

        #speedNum, #scoreNum {
            font-size: clamp(18px, 4vw, 24px); 
            font-weight: bold;
            color: #00ffcc;
        }
        #scoreNum { color: #ffeb3b; }
        .dash-label { font-size: clamp(10px, 2.5vw, 12px); color: #aaa; margin-bottom: 2px; }

        /* 터치 컨트롤러 (버튼 크기 대폭 확대) */
        #mobileControls {
            position: absolute;
            bottom: 8%; /* 버튼이 커진 만큼 살짝 위로 올림 */
            left: 0;
            width: 100%;
            display: none; 
            justify-content: space-between;
            padding: 0 4%;
            box-sizing: border-box;
            pointer-events: none; 
            z-index: 5;
        }

        .d-pad {
            display: flex;
            gap: 15px; /* 버튼 간격도 넓힘 */
        }

        .d-pad button {
            pointer-events: auto; 
            /* 버튼 크기를 70px ~ 100px 수준으로 대폭 상향 */
            width: clamp(70px, 18vw, 100px);
            height: clamp(70px, 18vw, 100px);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.7);
            /* 폰트(화살표) 크기도 24px ~ 36px 수준으로 상향 */
            font-size: clamp(24px, 7vw, 36px);
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
            backdrop-filter: blur(2px); 
        }

        .d-pad button:active {
            background: rgba(0, 255, 204, 0.4);
            border-color: #00ffcc;
            color: #fff;
        }

        @media (hover: none) and (pointer: coarse), (max-width: 768px) {
            #mobileControls { display: flex; }
        }

        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            cursor: pointer; 
        }

        #startScreen h1 {
            color: #00ffcc;
            font-size: clamp(28px, 8vw, 40px);
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0,255,204,0.5);
        }

        #gameOverScreen { display: none; }
        #gameOverScreen h1 {
            color: #ff3333;
            font-size: clamp(32px, 9vw, 45px);
            margin-bottom: 10px;
        }

        #finalScoreP {
            font-size: clamp(18px, 5vw, 22px);
            margin-bottom: 25px;
            color: #ffeb3b;
        }

        .guide-text {
            font-size: clamp(14px, 4vw, 16px);
            color: #aaa;
            margin-top: 15px;
            animation: blink 1.2s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="520" height="900"></canvas>
        
        <div id="dashboard">
            <div class="dash-label">SPEED</div>
            <div><span id="speedNum">0</span> km/h</div>
            <div class="dash-label" style="margin-top: 8px;">SCORE</div>
            <div><span id="scoreNum">0</span></div>
        </div>

        <div id="mobileControls">
            <div class="d-pad left-pad">
                <button id="btnLeft">◀</button>
                <button id="btnRight">▶</button>
            </div>
            <div class="d-pad right-pad">
                <button id="btnDown">▼</button>
                <button id="btnUp">▲</button>
            </div>
        </div>

        <div id="startScreen" class="screen-overlay">
            <h1>HIGHWAY DRIVE</h1>
            <p style="color: #ccc; margin-bottom: 30px; font-size: clamp(12px, 3.5vw, 15px);">
                방향키 또는 화면 하단 버튼으로 조작하세요
            </p>
            <p class="guide-text">화면을 터치하거나 SPACE를 누르세요</p>
        </div>

        <div id="gameOverScreen" class="screen-overlay">
            <h1>GAME OVER</h1>
            <p id="finalScoreP">최종 점수: 0</p>
            <p class="guide-text">화면을 터치하거나 SPACE를 누르세요</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const speedNum = document.getElementById('speedNum');
        const scoreNum = document.getElementById('scoreNum');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreP = document.getElementById('finalScoreP');

        let isGameStarted = false;
        let isGameOver = false;
        let lastTime = 0; 
        let gameOverDelayCounter = 0;
        const maxGameOverDelay = 1.0; 

        let speed = 0; 
        let scoreAccumulator = 0; 
        let score = 0;
        const maxSpeed = 180; 
        const minSpeed = 0;
        const acceleration = 60.0;  
        const deceleration = 108.0; 
        const naturalDecel = 30.0;  

        let lineOffset = 0;
        const lanes = [85, 155, 225, 295, 365, 435];

        const player = {
            x: 295, 
            y: 750, 
            baseY: 750,
            width: 40,
            height: 70,
            color: '#ff3333',
            sideSpeed: 360, 
            isWrecked: false 
        };

        let targetCars = [];
        let spawnTimeoutId = null; 
        const carColors = ['#33afec', '#fcb103', '#1cc88a', '#f6c23e', '#a15bf7', '#ffffff', '#8e8e93'];
        let effects = [];       
        let explosions = [];    

        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        window.addEventListener('keydown', (e) => {
            if (e.key === " " || e.code === "Space") {
                e.preventDefault();
                handleScreenAction();
                return;
            }
            if (e.key in keys) {
                keys[e.key] = true;
                if(e.key === "ArrowUp" || e.key === "ArrowDown") e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => { if (e.key in keys) keys[e.key] = false; });

        function handleScreenAction() {
            if (!isGameStarted) {
                startGame();
            } else if (isGameOver && gameOverDelayCounter >= maxGameOverDelay) {
                resetGame();
            }
        }
        startScreen.addEventListener('pointerdown', handleScreenAction);
        gameOverScreen.addEventListener('pointerdown', handleScreenAction);

        function bindVirtualButton(btnId, keyName) {
            const btn = document.getElementById(btnId);
            const press = (e) => { e.preventDefault(); keys[keyName] = true; };
            const release = (e) => { e.preventDefault(); keys[keyName] = false; };
            
            btn.addEventListener('touchstart', press, {passive: false});
            btn.addEventListener('touchend', release, {passive: false});
            btn.addEventListener('touchcancel', release, {passive: false});
            
            btn.addEventListener('mousedown', press);
            window.addEventListener('mouseup', release);
        }

        bindVirtualButton('btnLeft', 'ArrowLeft');
        bindVirtualButton('btnRight', 'ArrowRight');
        bindVirtualButton('btnUp', 'ArrowUp');
        bindVirtualButton('btnDown', 'ArrowDown');

        const carTypes = [
            { type: 'sedan', width: 40, height: 70, speedMin: 70, speedMax: 100 },
            { type: 'suv', width: 44, height: 78, speedMin: 75, speedMax: 105 },
            { type: 'bus', width: 46, height: 120, speedMin: 60, speedMax: 85 },
            { type: 'truck', width: 46, height: 100, speedMin: 65, speedMax: 90 }
        ];

        function createExplosion(x, y, count = 25) {
            for (let i = 0; i < count; i++) {
                explosions.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 400, 
                    vy: (Math.random() - 0.5) * 400 - (speed * 2), 
                    radius: Math.random() * 6 + 3,
                    color: Math.random() < 0.4 ? '#ff3300' : (Math.random() < 0.7 ? '#ffaa00' : '#555555'), 
                    alpha: 1.0,
                    life: Math.random() * 0.6 + 0.3 
                });
            }
        }

        function createCarInstance(forcedLane = null, forcedY = null) {
            const randomLaneIndex = forcedLane !== null ? forcedLane : Math.floor(Math.random() * lanes.length);
            const randomLaneX = lanes[randomLaneIndex];
            const typeInfo = carTypes[Math.floor(Math.random() * carTypes.length)];
            
            const isSpawnFromBehind = forcedY !== null ? false : (Math.random() < 0.2); 
            let spawnY = forcedY !== null ? forcedY : -150; 
            let carSpeed = Math.random() * (typeInfo.speedMax - typeInfo.speedMin) + typeInfo.speedMin;

            if (isSpawnFromBehind) {
                spawnY = canvas.height + 150; 
                carSpeed = Math.random() * 30 + 135; 
            }

            return {
                id: Math.random().toString(36).substr(2, 9),
                type: typeInfo.type,
                x: randomLaneX - (typeInfo.width / 2), 
                y: spawnY,
                width: typeInfo.width,
                height: typeInfo.height,
                color: carColors[Math.floor(Math.random() * carColors.length)],
                speed: carSpeed,
                currentLane: randomLaneIndex,
                laneChangeDir: 0,        
                isChanging: false,       
                blinkTimer: 0,           
                targetX: randomLaneX,
                nextDecisionTime: Date.now() + Math.random() * 1000 + 1000,
                nearMissChecked: false,
                isWrecked: false 
            };
        }

        function spawnCarLoop() {
            if (!isGameStarted || isGameOver) return;
            
            const newCar = createCarInstance();
            let clearToSpawn = true;
            for(let car of targetCars) {
                if(car.currentLane === newCar.currentLane && Math.abs(car.y - newCar.y) < 220) {
                    clearToSpawn = false;
                }
            }

            if(clearToSpawn) targetCars.push(newCar);
            spawnTimeoutId = setTimeout(spawnCarLoop, Math.random() * 300 + 250); 
        }

        function startGame() {
            isGameStarted = true;
            speed = 100; 
            startScreen.style.display = 'none';

            targetCars.push(createCarInstance(1, -100));
            targetCars.push(createCarInstance(3, -350));
            targetCars.push(createCarInstance(5, -600));

            lastTime = performance.now(); 
            spawnCarLoop();
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function isLaneSafe(checkingCar, targetLaneIndex) {
            for (let car of targetCars) {
                if (car.id === checkingCar.id) continue;
                if (car.currentLane === targetLaneIndex || (car.laneChangeDir !== 0 && car.targetX === lanes[targetLaneIndex])) {
                    if (Math.abs(car.y - checkingCar.y) < 160) return false; 
                }
            }
            return true;
        }

        function checkNearMiss(player, car) {
            if (car.nearMissChecked || car.isWrecked || player.isWrecked) return false;
            const horizontalDistance = Math.min(
                Math.abs((player.x + player.width) - car.x),
                Math.abs((car.x + car.width) - player.x)
            );
            const isYOverlapping = player.y < car.y + car.height && player.y + player.height > car.y;

            if (isYOverlapping && horizontalDistance < 12) {
                car.nearMissChecked = true; 
                return true;
            }
            return false;
        }

        function resetGame() {
            isGameOver = false;
            player.isWrecked = false;
            gameOverDelayCounter = 0;
            speed = 100; 
            score = 0;
            scoreAccumulator = 0;
            player.x = 295;
            player.y = player.baseY;
            targetCars = [];
            effects = [];
            explosions = [];
            gameOverScreen.style.display = 'none';
            
            if(spawnTimeoutId) clearTimeout(spawnTimeoutId);
            lastTime = performance.now();
            spawnCarLoop();
        }

        function update(dt) {
            if (!isGameStarted) return;

            if (!player.isWrecked) {
                if (keys.ArrowUp) {
                    speed = Math.min(maxSpeed, speed + acceleration * dt);
                } else if (keys.ArrowDown) {
                    speed = Math.max(minSpeed, speed - deceleration * dt);
                } else {
                    speed = Math.max(minSpeed, speed - naturalDecel * dt);
                }
                scoreAccumulator += speed * 0.9 * dt;
                score = Math.floor(scoreAccumulator);
            } else {
                speed = Math.max(minSpeed, speed - 180 * dt);
                
                gameOverDelayCounter += dt;
                if (gameOverDelayCounter >= maxGameOverDelay && !isGameOver) {
                    isGameOver = true;
                    finalScoreP.innerText = `최종 점수: ${score}`;
                    gameOverScreen.style.display = 'flex'; 
                }

                if (Math.random() < 30 * dt) { 
                    createExplosion(player.x + player.width / 2, player.y + player.height / 2, 2);
                }
            }

            speedNum.innerText = Math.floor(speed);
            scoreNum.innerText = score;

            let targetY = player.baseY - (speed / maxSpeed) * 250; 
            player.y += (targetY - player.y) * 6 * dt; 

            if (!player.isWrecked) {
                if (keys.ArrowLeft && player.x > 55) player.x -= player.sideSpeed * dt;
                if (keys.ArrowRight && player.x < canvas.width - 55 - player.width) player.x += player.sideSpeed * dt;
            }

            lineOffset += speed * 9 * dt;
            if (lineOffset > 40) lineOffset = 0;

            for (let j = 0; j < targetCars.length; j++) {
                for (let k = j + 1; k < targetCars.length; k++) {
                    let c1 = targetCars[j];
                    let c2 = targetCars[k];

                    if (!c1.isWrecked && !c2.isWrecked && checkCollision(c1, c2)) {
                        c1.isWrecked = true;
                        c2.isWrecked = true;
                        c1.speed = 0; 
                        c2.speed = 0;
                        createExplosion((c1.x + c2.x)/2 + 20, (c1.y + c2.y)/2 + 30, 15);
                    }
                }
            }

            for (let i = targetCars.length - 1; i >= 0; i--) {
                let car = targetCars[i];
                let relativeSpeed = (speed - car.speed) * 9 * dt; 
                car.y += relativeSpeed;

                if (!car.isWrecked && !player.isWrecked) {
                    if (Date.now() > car.nextDecisionTime && car.laneChangeDir === 0) {
                        if(Math.random() < 0.7) {
                            let dir = Math.random() < 0.5 ? -1 : 1;
                            let nextLane = car.currentLane + dir;
                            
                            if (nextLane >= 0 && nextLane < lanes.length && isLaneSafe(car, nextLane)) {
                                car.laneChangeDir = dir;
                                car.targetX = lanes[nextLane] - (car.width / 2); 
                                car.currentLane = nextLane;
                                car.blinkTimer = Date.now() + 500; 
                                car.isChanging = false;
                            }
                        }
                        car.nextDecisionTime = Date.now() + Math.random() * 1000 + 1000;
                    }

                    if (car.laneChangeDir !== 0) {
                        if (Date.now() > car.blinkTimer) {
                            car.isChanging = true;
                            car.x += car.laneChangeDir * 210 * dt; 

                            if ((car.laneChangeDir === 1 && car.x >= car.targetX) || 
                                (car.laneChangeDir === -1 && car.x <= car.targetX)) {
                                car.x = car.targetX;
                                car.laneChangeDir = 0;
                                car.isChanging = false;
                            }
                        }
                    }
                }

                if (!player.isWrecked && checkCollision(player, car)) {
                    player.isWrecked = true;
                    car.isWrecked = true; 
                    car.speed = 0;        
                    createExplosion((player.x + car.x) / 2 + 20, (player.y + car.y) / 2 + 35, 40); 
                }

                if (checkNearMiss(player, car)) {
                    scoreAccumulator += 500;
                    effects.push({
                        text: "NEAR MISS! +500",
                        x: player.x - 20,
                        y: player.y - 20,
                        alpha: 1.0,
                        life: 0.6 
                    });
                }

                if (car.y > canvas.height + 300 || car.y < -400) {
                    targetCars.splice(i, 1);
                }
            }

            for (let i = effects.length - 1; i >= 0; i--) {
                effects[i].y -= 60 * dt; 
                effects[i].alpha -= 1.6 * dt; 
                effects[i].life -= dt;
                if (effects[i].life <= 0) effects.splice(i, 1);
            }

            for (let i = explosions.length - 1; i >= 0; i--) {
                let p = explosions[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.alpha -= 1.5 * dt; 
                if (p.alpha <= 0) explosions.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#444';
            ctx.fillRect(50, 0, canvas.width - 100, canvas.height);
            ctx.fillStyle = '#1e7e34'; 
            ctx.fillRect(0, 0, 50, canvas.height);
            ctx.fillRect(canvas.width - 50, 0, 50, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.fillRect(50, 0, 5, canvas.height);
            ctx.fillRect(canvas.width - 55, 0, 5, canvas.height);

            ctx.fillStyle = '#fff';
            for (let y = -40 + lineOffset; y < canvas.height; y += 40) {
                ctx.fillRect(120, y, 3, 20);
                ctx.fillRect(190, y, 3, 20);
                ctx.fillRect(260, y, 3, 20); 
                ctx.fillRect(330, y, 3, 20);
                ctx.fillRect(400, y, 3, 20);
            }

            targetCars.forEach(car => {
                ctx.fillStyle = car.isWrecked ? '#222' : car.color; 
                ctx.fillRect(car.x, car.y, car.width, car.height);
                
                ctx.fillStyle = '#000';
                ctx.fillRect(car.x - 2, car.y + 10, 2, 14);
                ctx.fillRect(car.x + car.width, car.y + 10, 2, 14);
                ctx.fillRect(car.x - 2, car.y + car.height - 24, 2, 14);
                ctx.fillRect(car.x + car.width, car.y + car.height - 24, 2, 14);

                if (car.type === 'bus') {
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    ctx.fillRect(car.x + 4, car.y + 15, car.width - 8, 80);
                    ctx.fillStyle = car.isWrecked ? '#222' : car.color;
                    for(let wy = car.y + 25; wy < car.y + 90; wy += 15){
                        ctx.fillRect(car.x + 4, wy, car.width - 8, 3); 
                    }
                } else if (car.type === 'truck') {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(car.x, car.y + 25, car.width, 4); 
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(car.x + 4, car.y + 35, car.width - 8, car.height - 45); 
                } else if (car.type === 'suv') {
                    ctx.fillStyle = '#222';
                    ctx.fillRect(car.x + 6, car.y + 20, car.width - 12, 15);
                    ctx.fillRect(car.x + 6, car.y + 50, car.width - 12, 10);
                }

                if(!car.isWrecked) {
                    ctx.fillStyle = '#cc0000';
                    ctx.fillRect(car.x + 2, car.y + car.height - 4, 6, 4);
                    ctx.fillRect(car.x + car.width - 8, car.y + car.height - 4, 6, 4);

                    if (car.laneChangeDir !== 0 && Math.floor(Date.now() / 120) % 2 === 0) {
                        ctx.fillStyle = '#ffaa00'; 
                        if (car.laneChangeDir === -1) {
                            ctx.fillRect(car.x - 2, car.y + 2, 4, 6);
                            ctx.fillRect(car.x - 2, car.y + car.height - 8, 4, 6);
                        } else if (car.laneChangeDir === 1) {
                            ctx.fillRect(car.x + car.width - 2, car.y + 2, 4, 6);
                            ctx.fillRect(car.x + car.width - 2, car.y + car.height - 8, 4, 6);
                        }
                    }
                }
            });

            ctx.fillStyle = player.isWrecked ? '#222' : player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x - 3, player.y + 10, 3, 15);
            ctx.fillRect(player.x + player.width, player.y + 10, 3, 15);
            ctx.fillRect(player.x - 3, player.y + 45, 3, 15);
            ctx.fillRect(player.x + player.width, player.y + 45, 3, 15);
            
            if(!player.isWrecked) {
                ctx.fillStyle = '#ffffaa';
                ctx.fillRect(player.x + 4, player.y, 8, 4);
                ctx.fillRect(player.x + player.width - 12, player.y, 8, 4);
            }

            effects.forEach(eff => {
                ctx.save();
                ctx.globalAlpha = eff.alpha;
                ctx.fillStyle = '#ffeb3b';
                ctx.font = 'italic bold 16px Arial';
                ctx.shadowColor = 'black';
                ctx.shadowBlur = 4;
                ctx.fillText(eff.text, eff.x, eff.y);
                ctx.restore();
            });

            explosions.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function gameLoop(currentTime) {
            let dt = (currentTime - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1;
            lastTime = currentTime;

            update(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame((time) => {
            lastTime = time;
            gameLoop(time);
        });
    </script>
</body>
</html>
