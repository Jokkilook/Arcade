<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아케이드 게임 천국</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="tab-menu">
            <button class="tab-btn active" data-tab="game1">블록 부수기</button>
            <button class="tab-btn" data-tab="game2">천체 흡수하기</button>
            <button class="tab-btn" data-tab="game3">고속도로</button>
        </div>

        <div class="tab-content">
            <div id="game1" class="tab-panel active">
                <div class="panel-layer">
                    <div class="panel-viewport">
                        <iframe src="Block.html" title="Block" data-native-width="800" data-native-height="800"></iframe>
                    </div>
                </div>
            </div>
            <div id="game2" class="tab-panel">
                <div class="panel-layer">
                    <div class="panel-viewport">
                        <iframe src="Celestial.html" title="Celestial" data-native-width="1280" data-native-height="720"></iframe>
                    </div>
                </div>
            </div>
            <div id="game3" class="tab-panel">
                <div class="panel-layer">
                    <div class="panel-viewport">
                        <iframe id="highwayFrame" src="Highway.html" title="Highway" data-native-width="520" data-native-height="900"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
